<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>STEAM Day AR Racing - Smooth & ROI Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: '微軟正黑體', sans-serif; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #game-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }

        /* UI 元件 */
        #leaderboard {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: white; padding: 20px;
            border-radius: 15px; border: 2px solid #ffeb3b; min-width: 250px; font-size: 22px; pointer-events: auto;
        }
        #score-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #00ff00; padding: 15px 60px;
            border-radius: 60px; border: 4px solid #00ff00; font-size: 60px; font-weight: bold;
        }

        /* 鎖定功能按鈕 (移除陰影) */
        #roi-btn {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.8); color: white; padding: 15px 25px;
            border-radius: 15px; border: 2px solid #e74c3c; font-size: 20px;
            cursor: pointer; pointer-events: auto; z-index: 100; transition: 0.3s;
        }
        #roi-btn.active { border-color: #00ff00; color: #00ff00; }

        /* 角色 */
        .emoji-obj { position: absolute; display: flex; justify-content: center; align-items: center; font-size: 100px; z-index: 20; will-change: transform; }
        #player { bottom: 120px; left: 10%; width: 120px; height: 120px; transform: scaleX(-1); }
        #obstacle { right: -150px; width: 100px; height: 100px; }

        /* 按鈕與訊息 */
        #start-btn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 25px 50px; font-size: 32px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 60px; z-index: 100; pointer-events: auto; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; background: rgba(0,0,0,0.85); padding: 50px; border-radius: 30px; text-align: center; font-size: 36px; z-index: 50; }

        /* 高分輸入框架 (移除陰影) */
        #record-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #333; padding: 40px; border-radius: 20px;
            text-align: center; z-index: 200; pointer-events: auto; display: none;
            border: 5px solid #ffeb3b;
        }
        #record-modal h2 { margin: 0 0 20px; color: #d35400; }
        #record-modal input { font-size: 24px; padding: 10px; margin: 10px; width: 80%; border-radius: 10px; border: 2px solid #ccc; text-align: center; }
        #save-btn { background: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 24px; border-radius: 10px; cursor: pointer; margin-top: 20px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <video id="input_video" style="display:none;" playsinline></video>
    <canvas id="output_canvas"></canvas>
    
    <button id="roi-btn" onclick="toggleROI()">🎯 鎖定中央: 關閉</button>
    <button id="start-btn" onclick="initCamera()">🏎️ 開始賽車</button>

    <div id="game-layer">
        <div id="leaderboard">
            <h3 style="margin:0; color:#ffeb3b">🏆 榮譽榜 (前五名)</h3>
            <div id="score-list"></div>
        </div>
        <div id="score-container">Score: <span id="current-score">0</span></div>
        <div id="msg" class="hidden">載入中...</div>
        
        <div id="player" class="emoji-obj">🏎️</div>
        <div id="obstacle" class="emoji-obj"></div>
    </div>

    <div id="record-modal">
        <h2>🎊 破紀錄了！</h2>
        <p style="font-size: 24px;">你排進了前五名！請留下你的紀錄：</p>
        <input type="text" id="class-id" placeholder="範例：5C" maxlength="10"><br>
        <input type="text" id="student-num" placeholder="學號：12" maxlength="10"><br>
        <button id="save-btn" onclick="saveRecord()">儲存紀錄</button>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const player = document.getElementById("player");
        const obstacle = document.getElementById("obstacle");
        const msg = document.getElementById("msg");
        const scoreDisplay = document.getElementById("current-score");
        const recordModal = document.getElementById("record-modal");
        const roiBtn = document.getElementById("roi-btn");

        let useROI = false;
        const roiCanvas = document.createElement('canvas');
        const roiCtx = roiCanvas.getContext('2d', { willReadFrequently: true });

        let gameState = "WAITING"; 
        let score = 0;
        let isJumping = false;
        let jumpV = 0;
        const groundLevel = 120;
        let objX = -300;
        let highScores = JSON.parse(localStorage.getItem('arDinoScores')) || [];
        let prevY = 0;
        let lastDeathTime = 0;
        let lastFrameTime = performance.now();

        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        function toggleROI() {
            useROI = !useROI;
            if (useROI) {
                roiBtn.innerText = "🎯 鎖定中央: 開啟";
                roiBtn.classList.add("active");
            } else {
                roiBtn.innerText = "🎯 鎖定中央: 關閉";
                roiBtn.classList.remove("active");
            }
        }

        // ⚡ 繪製輕量化骨架 (移除所有 shadow 屬性)
        function drawSimpleSkeleton(ctx, landmarks, width, height) {
            const connections = [
                [11,12], [11,13], [13,15], [12,14], [14,16],
                [11,23], [12,24], [23,24],                  
                [23,25], [25,27], [24,26], [26,28],          
                [8,6], [6,5], [5,4], [4,0], [0,1], [1,2], [2,3], [3,7], [10,9]
            ];

            ctx.lineWidth = 3; // 縮小線條粗細，看起來更俐落
            ctx.strokeStyle = '#00ffff'; 

            ctx.beginPath();
            connections.forEach(([i, j]) => {
                const p1 = landmarks[i];
                const p2 = landmarks[j];
                if (p1 && p2 && p1.visibility > 0.5 && p2.visibility > 0.5) {
                    ctx.moveTo(p1.x * width, p1.y * height);
                    ctx.lineTo(p2.x * width, p2.y * height);
                }
            });
            ctx.stroke();

            ctx.fillStyle = '#ff00ff';
            landmarks.forEach((p) => {
                if (p.visibility > 0.5) {
                    ctx.beginPath();
                    ctx.arc(p.x * width, p.y * height, 4, 0, 2 * Math.PI); // 縮小關節點圓圈
                    ctx.fill();
                }
            });
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            canvasCtx.translate(canvasElement.width, 0);
            canvasCtx.scale(-1, 1);
            
            if (useROI) {
                canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
                
                canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                canvasCtx.fillRect(0, 0, canvasElement.width * 0.25, canvasElement.height);
                canvasCtx.fillRect(canvasElement.width * 0.75, 0, canvasElement.width * 0.25, canvasElement.height);
                
                canvasCtx.strokeStyle = '#00ff00';
                canvasCtx.lineWidth = 4;
                canvasCtx.setLineDash([20, 15]); 
                canvasCtx.strokeRect(canvasElement.width * 0.25, 0, canvasElement.width * 0.5, canvasElement.height);
                canvasCtx.setLineDash([]);
            } else {
                canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            }

            if (results.poseLandmarks) {
                let adjustedLandmarks = results.poseLandmarks;
                if (useROI) {
                    adjustedLandmarks = results.poseLandmarks.map(p => ({
                        ...p,
                        x: p.x * 0.5 + 0.25
                    }));
                }

                // 呼叫輕量化的骨架繪圖函式
                drawSimpleSkeleton(canvasCtx, adjustedLandmarks, canvasElement.width, canvasElement.height);

                if(gameState === "WAITING") {
                    gameState = "START";
                    msg.innerHTML = "準備好了！<br><span style='color:yellow'>跳起以開始</span>";
                    msg.classList.remove("hidden");
                }
                
                let currentY = (adjustedLandmarks[11].y + adjustedLandmarks[12].y) / 2;
                if (prevY !== 0 && (prevY - currentY) > 0.05) { 
                    handleInput(); 
                }
                prevY = currentY;
            }

            canvasCtx.restore();
        }

        function handleInput() {
            const currentTime = Date.now();
            if (recordModal.style.display === "block") return;

            if (gameState === "GAMEOVER") {
                if (currentTime - lastDeathTime < 2000) return;
                resetGame();
            } else if (gameState === "START") {
                resetGame();
            } else if (gameState === "PLAYING" && !isJumping) {
                isJumping = true;
                jumpV = 32;
            }
        }

        function resetGame() {
            gameState = "PLAYING";
            score = 0;
            scoreDisplay.innerText = "0";
            spawnObstacle();
            msg.classList.add("hidden");
            lastFrameTime = performance.now();
        }

        function spawnObstacle() {
            objX = window.innerWidth;
            const rand = Math.random();
            if (rand < 0.66) {
                obstacle.innerText = "💩";
                obstacle.style.bottom = "120px";
            } else {
                obstacle.innerText = "🦅";
                const heights = ["320px", "420px"];
                obstacle.style.bottom = heights[Math.floor(Math.random() * heights.length)];
            }
        }

        function gameLoop(now) {
            const dt = (now - lastFrameTime) / 16.67; 
            lastFrameTime = now;

            if (gameState === "PLAYING") {
                let bottom = parseFloat(window.getComputedStyle(player).bottom);
                if (isJumping) {
                    bottom += jumpV * dt;
                    jumpV -= 1.6 * dt;
                    if (bottom <= groundLevel) {
                        bottom = groundLevel;
                        isJumping = false;
                        player.style.transform = "scaleX(-1) rotate(0deg)";
                    } else {
                        player.style.transform = "scaleX(-1) rotate(-15deg)";
                    }
                    player.style.bottom = bottom + "px";
                }

                let speed = (10 + (score / 10)) * dt;
                objX -= speed;

                if (objX < -150) {
                    score += 10;
                    scoreDisplay.innerText = score;
                    spawnObstacle();
                }
                obstacle.style.transform = `translateX(${objX - window.innerWidth}px)`;

                if (checkCollision(player, obstacle)) {
                    gameOver();
                }
            }
            requestAnimationFrame(gameLoop);
        }

        function checkCollision(a, b) {
            let ra = a.getBoundingClientRect();
            let rb = b.getBoundingClientRect();
            return !(ra.right < rb.left + 35 || ra.left > rb.right - 35 || ra.bottom < rb.top + 35 || ra.top > rb.bottom - 35);
        }

        function gameOver() {
            gameState = "GAMEOVER";
            lastDeathTime = Date.now();
            player.style.transform = "scaleX(-1) rotate(0deg)";
            
            const isTopFive = highScores.length < 5 || score > highScores[highScores.length - 1].score;

            if (isTopFive && score > 0) {
                recordModal.style.display = "block";
            } else {
                msg.innerHTML = `💥 撞到了！<br>得分: ${score}<br><span style="font-size:24px; color:#aaa">2 秒後可跳起重啟</span>`;
                msg.classList.remove("hidden");
            }
            updateLeaderboardUI();
        }

        function saveRecord() {
            const classVal = document.getElementById("class-id").value || "未知班別";
            const numVal = document.getElementById("student-num").value || "??";
            
            const newRecord = {
                label: `${classVal} (${numVal})`,
                score: score
            };

            highScores.push(newRecord);
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 5); 

            localStorage.setItem('arDinoScores', JSON.stringify(highScores));
            
            recordModal.style.display = "none";
            document.getElementById("class-id").value = "";
            document.getElementById("student-num").value = "";
            
            msg.innerHTML = `🏆 紀錄已儲存！<br>得分: ${score}<br><span style="font-size:24px; color:#aaa">跳起重啟遊戲</span>`;
            msg.classList.remove("hidden");
            updateLeaderboardUI();
        }

        function updateLeaderboardUI() {
            document.getElementById("score-list").innerHTML = highScores.map((item, i) => 
                `<div style="margin-bottom:5px;">${i+1}. ${item.label} - <span style="color:#ffeb3b">${item.score}</span></div>`
            ).join('') || "尚無紀錄";
        }

        function initCamera() {
            document.getElementById("start-btn").classList.add("hidden");
            const pose = new Pose({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`});
            pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5 });
            pose.onResults(onResults);
            
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    if (!videoElement.videoWidth) return;

                    if (useROI) {
                        roiCanvas.width = videoElement.videoWidth * 0.5;
                        roiCanvas.height = videoElement.videoHeight;
                        
                        roiCtx.drawImage(
                            videoElement,
                            videoElement.videoWidth * 0.25, 0, 
                            videoElement.videoWidth * 0.5, videoElement.videoHeight, 
                            0, 0, roiCanvas.width, roiCanvas.height
                        );
                        await pose.send({image: roiCanvas});
                    } else {
                        await pose.send({image: videoElement});
                    }
                },
                width: 1280, height: 720
            });
            camera.start();
        }

        updateLeaderboardUI();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
